<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>OpenAI Realtime Voice Chat - Test Client</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      min-height: 100vh;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 24px;
      color: #fff;
    }

    #status-bar {
      width: 100%;
      max-width: 640px;
      padding: 10px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      background: #1e1e1e;
      border: 1px solid #333;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
    }

    #status-dot.connected {
      background: #22c55e;
    }

    #status-dot.error {
      background: #ef4444;
    }

    #status-dot.listening {
      background: #3b82f6;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    #chat-box {
      width: 100%;
      max-width: 640px;
      height: 340px;
      overflow-y: auto;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      padding: 8px 12px;
      border-radius: 8px;
      max-width: 85%;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .msg.user {
      background: #1d4ed8;
      align-self: flex-end;
    }

    .msg.ai {
      background: #2a2a2a;
      align-self: flex-start;
    }

    .msg.system {
      background: transparent;
      color: #666;
      font-size: 0.78rem;
      align-self: center;
      font-style: italic;
    }

    #controls {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 640px;
      margin-bottom: 12px;
    }

    #text-input {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      padding: 10px 14px;
      font-size: 0.9rem;
      outline: none;
    }

    #text-input:focus {
      border-color: #555;
    }

    button {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.15s;
    }

    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    #btn-send {
      background: #1d4ed8;
      color: #fff;
    }

    #btn-record {
      background: #16a34a;
      color: #fff;
      min-width: 130px;
    }

    #btn-record.recording {
      background: #dc2626;
    }

    #audio-indicator {
      font-size: 0.78rem;
      color: #555;
      height: 18px;
      margin-top: -8px;
      margin-bottom: 8px;
    }

    #ai-audio {
      display: none;
    }
  </style>
</head>

<body>
  <h1>OpenAI Realtime Voice Chat</h1>

  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">Connecting to server...</span>
  </div>

  <div id="chat-box"></div>

  <div id="audio-indicator" id="audio-indicator"></div>

  <div id="controls">
    <input id="text-input" type="text" placeholder="Type a message..." />
    <button id="btn-send" disabled>Send</button>
    <button id="btn-record" disabled>🎤 Hold to Talk</button>
  </div>

  <audio id="ai-audio" autoplay></audio>

  <script>
    // ─── Config ───────────────────────────────────────────────────────────────
    const SERVER_URL = "http://localhost:3000";
    const SAMPLE_RATE = 24000; // OpenAI PCM16 output sample rate

    // ─── UI Refs ──────────────────────────────────────────────────────────────
    const statusDot = document.getElementById("status-dot");
    const statusText = document.getElementById("status-text");
    const chatBox = document.getElementById("chat-box");
    const textInput = document.getElementById("text-input");
    const btnSend = document.getElementById("btn-send");
    const btnRecord = document.getElementById("btn-record");
    const audioEl = document.getElementById("ai-audio");
    const audioIndicator = document.getElementById("audio-indicator");

    // ─── Socket.IO ────────────────────────────────────────────────────────────
    const socket = io(SERVER_URL);

    socket.on("connect", () => setStatus("connected", `Connected (${socket.id})`));
    socket.on("disconnect", () => {
      setStatus("error", "Disconnected from server");
      btnSend.disabled = true;
      btnRecord.disabled = true;
    });
    socket.on("connect_error", () => setStatus("error", "Cannot reach server"));

    socket.on("realtime.ready", () => {
      setStatus("connected", "Ready — OpenAI session active");
      btnSend.disabled = false;
      btnRecord.disabled = false;
      addMsg("system", "Session started. You can speak or type.");
    });

    socket.on("socket_error", ({ error }) => {
      addMsg("system", `Error: ${typeof error === "object" ? error.message : error}`);
    });

    // ─── Transcript streaming ─────────────────────────────────────────────────
    let aiMsgEl = null;

    socket.on("output_transcript", ({ delta }) => {
      if (!aiMsgEl) {
        aiMsgEl = addMsg("ai", "");
      }
      aiMsgEl.textContent += delta;
      chatBox.scrollTop = chatBox.scrollHeight;
    });

    socket.on("realtime.response.audio_transcript.done", () => {
      aiMsgEl = null;
    });

    socket.on("ai_stream_done", () => {
      aiMsgEl = null;
    });

    // ─── VAD indicators ───────────────────────────────────────────────────────
    socket.on("speech_started", () => {
      setStatus("listening", "Listening...");
      audioIndicator.textContent = "🎙 AI detected your voice...";
    });

    socket.on("speech_stopped", () => {
      setStatus("connected", "Processing...");
      audioIndicator.textContent = "⏳ Processing...";
    });

    socket.on("ai_audio_done", () => {
      audioIndicator.textContent = "";
      setStatus("connected", "Ready");
    });

    // ─── AI Audio Playback (PCM16 → Web Audio API) ────────────────────────────
    let audioCtx = null;
    let audioQueue = [];
    let isPlaying = false;
    let nextPlayTime = 0;

    socket.on("aiAudio", ({ data }) => {
      if (!audioCtx) audioCtx = new AudioContext({ sampleRate: SAMPLE_RATE });
      const pcm = base64ToPCM(data);
      scheduleAudio(pcm);
    });

    function base64ToPCM(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      // PCM16 little-endian → float32
      const samples = bytes.length / 2;
      const float32 = new Float32Array(samples);
      const view = new DataView(bytes.buffer);
      for (let i = 0; i < samples; i++) {
        float32[i] = view.getInt16(i * 2, true) / 32768;
      }
      return float32;
    }

    function scheduleAudio(float32) {
      if (!audioCtx) return;
      if (audioCtx.state === "suspended") audioCtx.resume();

      const buffer = audioCtx.createBuffer(1, float32.length, SAMPLE_RATE);
      buffer.copyToChannel(float32, 0);

      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.connect(audioCtx.destination);

      const now = audioCtx.currentTime;
      if (nextPlayTime < now) nextPlayTime = now;
      source.start(nextPlayTime);
      nextPlayTime += buffer.duration;
    }

    // ─── Text Message ─────────────────────────────────────────────────────────
    btnSend.addEventListener("click", sendText);
    textInput.addEventListener("keydown", (e) => { if (e.key === "Enter") sendText(); });

    function sendText() {
      const text = textInput.value.trim();
      if (!text) return;
      addMsg("user", text);
      socket.emit("realtime.conversation.item.create", {
        item: {
          type: "message",
          role: "user",
          content: [{ type: "input_text", text }],
        },
      });
      socket.emit("realtime.response.create", {});
      textInput.value = "";
      aiMsgEl = null;
    }

    // ─── Voice Recording (Push-to-Talk) ──────────────────────────────────────
    let mediaStream = null;
    let audioWorkletNode = null;
    let recorderCtx = null;

    btnRecord.addEventListener("mousedown", startRecording);
    btnRecord.addEventListener("mouseup", stopRecording);
    btnRecord.addEventListener("touchstart", (e) => { e.preventDefault(); startRecording(); });
    btnRecord.addEventListener("touchend", (e) => { e.preventDefault(); stopRecording(); });

    async function startRecording() {
      // Resume AudioContext if suspended (browser autoplay policy)
      if (audioCtx && audioCtx.state === "suspended") await audioCtx.resume();

      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recorderCtx = new AudioContext({ sampleRate: 24000 });
        await recorderCtx.audioWorklet.addModule(inlineWorkletURL());

        const source = recorderCtx.createMediaStreamSource(mediaStream);
        audioWorkletNode = new AudioWorkletNode(recorderCtx, "pcm-processor");

        audioWorkletNode.port.onmessage = (e) => {
          const pcm16 = float32ToPCM16(e.data);
          const base64 = pcm16ToBase64(pcm16);
          socket.emit("userAudio", { audio: base64 });
        };

        source.connect(audioWorkletNode);
        audioWorkletNode.connect(recorderCtx.destination);

        btnRecord.classList.add("recording");
        btnRecord.textContent = "🔴 Recording...";
        audioIndicator.textContent = "🎙 Speaking...";
        nextPlayTime = 0; // reset playback time
      } catch (err) {
        addMsg("system", `Mic error: ${err.message}`);
      }
    }

    function stopRecording() {
      if (audioWorkletNode) { audioWorkletNode.disconnect(); audioWorkletNode = null; }
      if (recorderCtx) { recorderCtx.close(); recorderCtx = null; }
      if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }

      socket.emit("realtime.input_audio_buffer.commit");

      btnRecord.classList.remove("recording");
      btnRecord.textContent = "🎤 Hold to Talk";
      audioIndicator.textContent = "⏳ Processing...";
    }

    function float32ToPCM16(float32) {
      const pcm = new Int16Array(float32.length);
      for (let i = 0; i < float32.length; i++) {
        const s = Math.max(-1, Math.min(1, float32[i]));
        pcm[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
      }
      return pcm;
    }

    function pcm16ToBase64(pcm16) {
      const bytes = new Uint8Array(pcm16.buffer);
      let binary = "";
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary);
    }

    // Inline AudioWorklet Processor (avoids needing a separate file)
    function inlineWorkletURL() {
      const code = `
        class PCMProcessor extends AudioWorkletProcessor {
          process(inputs) {
            const ch = inputs[0][0];
            if (ch) this.port.postMessage(ch.slice());
            return true;
          }
        }
        registerProcessor("pcm-processor", PCMProcessor);
      `;
      const blob = new Blob([code], { type: "application/javascript" });
      return URL.createObjectURL(blob);
    }

    // ─── Helpers ──────────────────────────────────────────────────────────────
    function addMsg(type, text) {
      const el = document.createElement("div");
      el.className = `msg ${type}`;
      el.textContent = text;
      chatBox.appendChild(el);
      chatBox.scrollTop = chatBox.scrollHeight;
      return el;
    }

    function setStatus(state, text) {
      statusDot.className = "";
      statusDot.classList.add(state);
      statusText.textContent = text;
    }
  </script>
</body>

</html>
